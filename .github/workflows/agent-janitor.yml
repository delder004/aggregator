name: agent-janitor

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      goal:
        description: 'Goal override (leave blank to use the default janitor goal)'
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: agent-janitor
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run janitor agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AGGREGATOR_AGENT_ID: ${{ secrets.AGGREGATOR_AGENT_ID }}
          AGGREGATOR_ENV_ID: ${{ secrets.AGGREGATOR_ENV_ID }}
          GITHUB_REPO_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          GOAL_INPUT: ${{ inputs.goal }}
        run: |
          GOAL="${GOAL_INPUT:-Audit the site for correctness bugs only — data-accuracy, content-quality, broken/corrupted/stale data, off-topic articles, mislabeled records. Use TWO observation passes: (1) inspect D1 via cf_api for data-layer bugs, and (2) web_fetch a sample of live pages including /, /companies, /map, /jobs, /sitemap.xml, /feed.xml, plus one /article/<id> and one /company/<id> picked from D1, to verify HTTP 200, expected H2 heading, content-type, sub-50KB page weight, and well-formed JSON-LD. Treat any rendering or KV-publish anomaly (5xx, missing/wrong H2, malformed schema, oversized payload, stale content) as a bug. If you find a concrete fixable bug from either pass, ship a targeted fix with tsc+vitest validation and open a PR via github_api. If you only find improvement opportunities (SEO, copy, UX, new content surfaces), do NOT ship them — note them in your final message and stop. Those belong to the contributor agent.}"
          npx tsx scripts/run-site-agent.mts "$GOAL"
