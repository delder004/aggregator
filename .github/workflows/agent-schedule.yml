name: agent-schedule

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      goal:
        description: 'Goal override (leave blank to use the default steady-state goal)'
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run site agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AGGREGATOR_AGENT_ID: ${{ secrets.AGGREGATOR_AGENT_ID }}
          AGGREGATOR_ENV_ID: ${{ secrets.AGGREGATOR_ENV_ID }}
          GITHUB_REPO_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          GOAL_INPUT: ${{ inputs.goal }}
        run: |
          GOAL="${GOAL_INPUT:-Audit the site for data-accuracy or content-quality issues. Inspect D1 via cf_api. If you find a concrete, fixable issue (off-topic content, mislabeled pillars, corrupted data, stale entries, broken links, or similar), make a targeted code fix with tsc+vitest validation and open a PR via github_api. If nothing concerning stands out this week, say so clearly and stop — do not manufacture a task.}"
          npx tsx scripts/run-site-agent.mts "$GOAL"
