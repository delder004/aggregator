name = "agenticaiaccounting"
main = "src/index.ts"
compatibility_date = "2025-03-14"

routes = [
  { pattern = "agenticaiccounting.com", custom_domain = true },
]

[triggers]
crons = ["0 * * * *", "0 13 * * 1"]

[[d1_databases]]
binding = "DB"
database_name = "agenticaiaccounting-db"
database_id = "2a4fa461-6163-4394-9ad1-3049d49a036c"

[[kv_namespaces]]
binding = "KV"
id = "bf47d4e3ebcf48dbaecb61d968a870fb"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[workflows]]
name = "agenticaiaccounting-collect"
binding = "COLLECT_WORKFLOW"
class_name = "CollectWorkflow"

[[workflows]]
name = "agenticaiaccounting-process"
binding = "PROCESS_WORKFLOW"
class_name = "ProcessWorkflow"

[[workflows]]
name = "agenticaiaccounting-ingest"
binding = "INGEST_WORKFLOW"
class_name = "IngestWorkflow"

[[analytics_engine_datasets]]
binding = "AE_EVENTS"
dataset = "agenticaiaccounting_article_views"

[[analytics_engine_datasets]]
binding = "AE_ENGAGEMENT"
dataset = "agenticaiaccounting_engagement"
